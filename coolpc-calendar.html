<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoolPC 請假行事曆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        
        select, button {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        select {
            min-width: 200px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            font-weight: bold;
        }
        
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .calendar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .calendar-header h2 {
            color: #333;
            font-size: 1.5em;
        }
        
        .month-nav {
            display: flex;
            gap: 10px;
        }
        
        .month-nav button {
            padding: 8px 15px;
            font-size: 14px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .day-header {
            background: #333;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-radius: 5px;
        }
        
        .day {
            min-height: 100px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 5px;
            border: 1px solid #eee;
        }
        
        .day:hover {
            background: #f0f0f0;
        }
        
        .day.today {
            background: #e3f2fd;
            border: 2px solid #2196F3;
        }
        
        .day.other-month {
            background: #f5f5f5;
            opacity: 0.5;
        }
        
        .day-number {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .leave-person {
            background: #ff9800;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .leave-person.特休 {
            background: #4CAF50;
        }
        
        .leave-person.排休 {
            background: #2196F3;
        }
        
        .leave-person.喪假 {
            background: #9c27b0;
        }
        
        .leave-person.病假 {
            background: #f44336;
        }
        
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .stats h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .stats-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stat-item {
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-item .count {
            font-weight: bold;
            color: #2196F3;
        }
        
        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: repeat(7, 1fr);
                font-size: 12px;
            }
            
            .day {
                min-height: 60px;
                padding: 4px;
            }
            
            .leave-person {
                font-size: 10px;
                padding: 2px 4px;
            }
        }
    </style>
</head>
<body>

        <h1>📅 CoolPC 請假行事曆</h1>
        
        <div class="controls">
            <select id="monthSelect">
                <option value="0">2026年3月</option>
                <option value="1">2026年4月</option>
                <option value="2">2026年5月</option>
            </select>
            <button onclick="loadData()">🔄 更新資料</button>
        </div>
        
        <div class="calendar">
            <div class="calendar-header">
                <h2 id="calendarTitle">2026年3月</h2>
                <div class="month-nav">
                    <button onclick="changeMonth(-1)">◀ 上個月</button>
                    <button onclick="changeMonth(1)">下個月 ▶</button>
                </div>
            </div>
            
            <div class="calendar-grid">
                <div class="day-header">日</div>
                <div class="day-header">一</div>
                <div class="day-header">二</div>
                <div class="day-header">三</div>
                <div class="day-header">四</div>
                <div class="day-header">五</div>
                <div class="day-header">六</div>
            </div>
            
            <div class="calendar-grid" id="calendarBody">
            </div>
            
            <div class="stats" id="stats">
                <h3>📊 部門統計</h3>
                <div class="stats-list" id="statsList"></div>

    </div>

            },
            "高雄店": {
                "15": ["吳俊豪(排休)", "林耀信(排休)", "郭宇哲(排休)", "宋品緯(排休)", "高維謙(排休)", "曾子豪(排休)", "葉宇宸(排休)"]
            },
            "宜蘭店": {
                "6": ["姜淳文(病假)", "廖偉聖(排休)", "陳琬婷(排休)", "姜淳文"]
            }
        };

        let currentMonth = 2; // 3月 (0-indexed)
        let currentYear = 2026;

        function getMonthName(month) {
            const months = ["1月", "2月", "3月", "4月", "5月", "6月", 
                          "7月", "8月", "9月", "10月", "11月", "12月"];
            return months[month];
        }

        function renderCalendar() {
            document.getElementById('calendarTitle').textContent = `${currentYear}年${getMonthName(currentMonth)}`;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            const calendarBody = document.getElementById('calendarBody');
            calendarBody.innerHTML = '';
            
            // 上個月的天數
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'day other-month';
                day.innerHTML = `<div class="day-number">${daysInPrevMonth - i}</div>`;
                calendarBody.appendChild(day);
            }
            
            // 當月天數
            for (let day = 1; day <= daysInMonth; day++) {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'day';
                
                if (today.getDate() === day && 
                    today.getMonth() === currentMonth && 
                    today.getFullYear() === currentYear) {
                    dayDiv.classList.add('today');
                }
                
                let dayContent = `<div class="day-number">${day}</div>`;
                
                // 檢查每個部門的請假資料
                for (const [dept, leaves] of Object.entries(departmentData)) {
                    if (leaves[day.toString()]) {
                        leaves[day.toString()].forEach(person => {
                            let leaveType = '排休';
                            if (person.includes('特休')) leaveType = '特休';
                            else if (person.includes('喪假')) leaveType = '喪假';
                            else if (person.includes('病假')) leaveType = '病假';
                            
                            dayContent += `<div class="leave-person ${leaveType}">${person}</div>`;
                        });
                    }
                }
                
                dayDiv.innerHTML = dayContent;
                calendarBody.appendChild(day);
            }
            
            // 補齊剩餘格子
            const totalCells = firstDay + daysInMonth;
            const remainingCells = 7 - (totalCells % 7);
            if (remainingCells < 7) {
                for (let i = 1; i <= remainingCells; i++) {
                    const day = document.createElement('div');
                    day.className = 'day other-month';
                    day.innerHTML = `<div class="day-number">${i}</div>`;
                    calendarBody.appendChild(day);
                }
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        }

        function loadData() {
            alert('資料已更新！');
            renderCalendar();
        }

        // 初始化
        renderCalendar();
    </script>

</html>
