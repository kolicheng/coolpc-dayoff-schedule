<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoolPC 請假行事曆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        
        select, button {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        select {
            min-width: 200px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            font-weight: bold;
        }
        
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }
        
        .legend {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            font-size: 14px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .legend-color.排休 { background: #2196F3; }
        .legend-color.特休 { background: #4CAF50; }
        .legend-color.喪假 { background: #9c27b0; }
        .legend-color.病假 { background: #f44336; }
        
        .department-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .department-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }
        
        .department-header h2 {
            color: #333;
            font-size: 1.3em;
        }
        
        .department-stats {
            color: #666;
            font-size: 14px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        
        .day-header {
            background: #333;
            color: white;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .day {
            min-height: 80px;
            padding: 5px;
            background: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        
        .day:hover {
            background: #f0f0f0;
        }
        
        .day.today {
            background: #e3f2fd;
            border: 2px solid #2196F3;
        }
        
        .day.other-month {
            background: #f5f5f5;
            opacity: 0.4;
        }
        
        .day.weekend {
            background: #fff3e0;
        }
        
        .day-number {
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
            font-size: 14px;
        }
        
        .leave-person {
            background: #ff9800;
            color: white;
            padding: 3px 5px;
            border-radius: 3px;
            font-size: 11px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .leave-person.特休 { background: #4CAF50; }
        .leave-person.排休 { background: #2196F3; }
        .leave-person.喪假 { background: #9c27b0; }
        .leave-person.病假 { background: #f44336; }
        
        .week-summary {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .week-summary h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .week-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .week-day {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        
        .week-day-name {
            font-weight: bold;
            color: #666;
            font-size: 12px;
        }
        
        .week-day-num {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        
        .week-day-leaves {
            margin-top: 5px;
            font-size: 11px;
            color: #666;
        }
        
        .month-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .month-nav button {
            padding: 8px 15px;
            font-size: 14px;
        }
        
        #currentMonth {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            min-width: 150px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: repeat(7, 1fr);
                font-size: 10px;
            }
            
            .day {
                min-height: 50px;
                padding: 2px;
            }
            
            .leave-person {
                font-size: 9px;
                padding: 1px 2px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 CoolPC 請假行事曆</h1>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-color 排休"></div> 排休</div>
            <div class="legend-item"><div class="legend-color 特休"></div> 特休</div>
            <div class="legend-item"><div class="legend-color 喪假"></div> 喪假</div>
            <div class="legend-item"><div class="legend-color 病假"></div> 病假</div>
        </div>
        
        <div class="controls">
            <div class="month-nav">
                <button onclick="changeMonth(-1)">◀</button>
                <span id="currentMonth">2026年3月</span>
                <button onclick="changeMonth(1)">▶</button>
            </div>
            
            <select id="deptSelect" onchange="renderAllDepartments()">
                <option value="all">全部部門</option>
            </select>
            
            <button onclick="loadData()">🔄 更新</button>
        </div>

        <div id="calendarContainer"></div>
    </div>

    <script>

        const allLeaveData = {

            },
            "新現代1F": {
                6: ["王彥淳(排休)", "唐士皓(排休)", "黃柏元(排休)", "唐士皓", "黃柏元"]
            },
            "現代店": {
                8: ["李炫錚(排休)", "陳冠智(排休)", "黃裕鈞(排休)", "張奕偉(特休)", "劉奕德(特休)", "劉奕德"]
            },
            "光華店": {

            },
            "工程部": {
                12: ["林隆盛(排休)", "梁瑞峰(喪假)", "謝伯承(排休)", "王昱捷(排休)", "梁瑞峰", "陳正展(排休)", "王佩昀(特休)", "梁哲毓(排休)", "詹皓翔(排休)"]
            },
            "維修部": {
                7: ["林俞安(排休)", "林峙仲(排休)", "戴浩翔(排休)", "薛佳文(排休)", "蔡松成(排休)", "薛佳文"]
            },
            "電子商務部": {
                16: ["吳翰柏(排休)", "汪書鈺(排休)", "林義勝(排休)", "陳怡君(排休)", "黃正賢(排休)", "黃麗梅(排休)", "李采瀚(排休)", "徐詠俊(排休)", "陳立哲(排休)", "吳奕憲(排休)", "吳翰柏", "陳立哲", "陳信仲(排休)"]
            },
            "五股廠": {
                11: ["曾家寶(排休)", "潘俐辰(特休)", "盧世凱(排休)", "李冠臻(排休)", "曾家寶", "盧世凱", "藍永昌(排休)", "陳迪信(排休)", "潘俐辰"]
            },
            "採購部": {
                11: ["王振泰(排休)", "李振威(排休)", "沈淑娟(排休)", "邱庭方(排休)", "張仁杰(排休)", "張議陽(排休)", "黃珮涵(排休)", "黃渝文(排休)", "黃偉哲(排休)", "游智崴(排休)"]
            },
            "行銷部": {
                8: ["林榮邦(排休)", "范揚正(排休)", "賴品成(排休)", "范揚正", "簡志穎(排休)", "范揚正(特休)", "簡志穎", "李庭安(排休)"]
            },
            "蝦皮電商平台": {
                10: ["方鈺傑(排休)", "李志仁(排休)", "林益豪(排休)", "黃政哲(特休)", "林益豪", "胡逸仙(排休)", "蘇威又(排休)"]
            },
            "建教生": {
                19: ["呂鑫鴻(排休)", "林鼎碩(排休)", "洪鼎軒(排休)", "紀年育(排休)", "陳宥安(排休)", "陳泰鋮(排休)", "黃茂翔(排休)", "繆騰毅(排休)", "呂鑫鴻", "林琮祐(排休)", "林頎恩(排休)", "黃于豪(排休)", "黃茂翔"]
            },
            "桃園店": {

            },
            "中壢店": {
                11: ["陳文浩(排休)", "曾柏維(排休)", "韋星宇(排休)", "連展逸(排休)", "陳振翼(排休)", "朱陳淳煜(排休)", "徐正賓(排休)"]
            },
            "新竹店": {
                11: ["林家宇(排休)", "曹峻豪(喪假)", "黎政賢(排休)", "林俊諺(排休)", "莊賀喬(排休)", "鍾騏宇(排休)", "曹峻豪", "彭凱威(排休)"]
            },
            "台中一店": {
                6: ["楊士葆(排休)", "鄭翰興(排休)", "蔡宗峻(排休)", "鄭翰興(特休)", "曾偉鈞(排休)"]
            },
            "台中二店": {
                13: ["甘期朧(特休)", "李長益(排休)", "林恩佑(排休)", "梁傑凱(排休)", "郭桓丞(排休)", "甘期朧", "郭桓丞", "陳明遠(排休)", "黃冠沂(排休)", "潘澤綸(排休)", "甘期朧(排休)", "郭桓丞(特休)", "陳仕豪(排休)"]
            },
            "彰化店": {
                6: ["陳冠廷(排休)", "周錦男(排休)", "萬宗鑫(排休)", "葉郁誠(排休)"]
            },
            "嘉義店": {
                7: ["鄭凱元(排休)", "鍾禎(排休)", "簡士傑(排休)"]
            },
            "台南店": {
                15: ["何嘉益(排休)", "林柏良(特休)", "陳智成(排休)", "王柳翔(排休)", "林柏良", "張哲瑋(排休)", "楊甯淵(排休)"]
            },
            "高雄店": {
                15: ["吳俊豪(排休)", "林耀信(排休)", "郭宇哲(排休)", "宋品緯(排休)", "高維謙(排休)", "曾子豪(排休)", "葉宇宸(排休)"]
            },
            "宜蘭店": {
                6: ["姜淳文(病假)", "廖偉聖(排休)", "陳琬婷(排休)", "姜淳文"]
            }
        };

        let currentMonth = 2; // 3月 (0-indexed)
        let currentYear = 2026;

        // 初始化部門下拉選單
        function initDeptSelect() {
            const select = document.getElementById('deptSelect');
            const departments = Object.keys(allLeaveData).sort();
            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                select.appendChild(option);
            });
        }

        function getMonthName(month) {
            const months = ["1月", "2月", "3月", "4月", "5月", "6月", 
                          "7月", "8月", "9月", "10月", "11月", "12月"];
            return months[month];
        }

        function renderDepartmentCalendar(deptName, deptData) {
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            
            let html = `
                <div class="department-section">
                    <div class="department-header">
                        <h2>🏢 ${deptName}</h2>
                        <span class="department-stats">${Object.keys(deptData).length} 天有人請假</span>
                    </div>
                    <div class="calendar-grid">
                        <div class="day-header">日</div>
                        <div class="day-header">一</div>
                        <div class="day-header">二</div>
                        <div class="day-header">三</div>
                        <div class="day-header">四</div>
                        <div class="day-header">五</div>
                        <div class="day-header">六</div>
            `;
            
            // 上個月
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="day other-month"><div class="day-number">${daysInPrevMonth - i}</div></div>`;
            }
            
            // 當月
            for (let day = 1; day <= daysInMonth; day++) {
                let dayClass = 'day';
                const dayOfWeek = new Date(currentYear, currentMonth, day).getDay();
                
                if (today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear) {
                    dayClass += ' today';
                }
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    dayClass += ' weekend';
                }
                
                let dayContent = `<div class="day-number">${day}</div>`;
                
                if (deptData[day]) {
                    deptData[day].forEach(person => {
                        let leaveType = '排休';
                        if (person.includes('特休')) leaveType = '特休';
                        else if (person.includes('喪假')) leaveType = '喪假';
                        else if (person.includes('病假')) leaveType = '病假';
                        
                        dayContent += `<div class="leave-person ${leaveType}">${person}</div>`;
                    });
                }
                
                html += `<div class="${dayClass}">${dayContent}</div>`;
            }
            
            // 補齊
            const totalCells = firstDay + daysInMonth;
            const remainingCells = 7 - (totalCells % 7);
            if (remainingCells < 7) {
                for (let i = 1; i <= remainingCells; i++) {
                    html += `<div class="day other-month"><div class="day-number">${i}</div></div>`;
                }
            }
            
            html += '</div></div>';
            return html;
        }

        function renderAllDepartments() {
            const selectedDept = document.getElementById('deptSelect').value;
            document.getElementById('calendarContainer').innerHTML = '';
            
            document.getElementById('currentMonth').textContent = `${currentYear}年${getMonthName(currentMonth)}`;
            
            if (selectedDept === 'all') {
                // 顯示所有部門
                Object.entries(allLeaveData).forEach(([dept, data]) => {
                    document.getElementById('calendarContainer').innerHTML += renderDepartmentCalendar(dept, data);
                });
            } else {
                // 只顯示選取的部門
                document.getElementById('calendarContainer').innerHTML = renderDepartmentCalendar(selectedDept, allLeaveData[selectedDept]);
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            } else if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderAllDepartments();
        }

        function loadData() {
            alert('資料已更新！');
            renderAllDepartments();
        }

        // 初始化
        initDeptSelect();
        renderAllDepartments();
    </script>
</body>
</html>
