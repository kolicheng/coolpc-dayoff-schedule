<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoolPC 請假行事曆</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        
        select, button {
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        select {
            min-width: 250px;
        }
        
        button {
            background: #4CAF50;
            color: white;
            border: none;
            font-weight: bold;
        }
        
        button:hover {
            background: #45a049;
        }
        
        .legend {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 15px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
            font-size: 14px;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .legend-color.排休 { background: #2196F3; }
        .legend-color.特休 { background: #4CAF50; }
        .legend-color.喪假 { background: #9c27b0; }
        .legend-color.病假 { background: #f44336; }
        
        .calendar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        
        .calendar-header h2 {
            color: #333;
            font-size: 1.5em;
        }
        
        .month-nav {
            display: flex;
            gap: 10px;
        }
        
        .month-nav button {
            padding: 8px 15px;
            font-size: 14px;
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }
        
        .day-header {
            background: #333;
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            border-radius: 4px;
        }
        
        .day {
            min-height: 100px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        
        .day:hover {
            background: #f0f0f0;
        }
        
        .day.today {
            background: #e3f2fd;
            border: 2px solid #2196F3;
        }
        
        .day.other-month {
            background: #f5f5f5;
            opacity: 0.4;
        }
        
        .day.weekend {
            background: #fff3e0;
        }
        
        .day-number {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
            font-size: 16px;
        }
        
        .leave-person {
            background: #ff9800;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .leave-person.特休 { background: #4CAF50; }
        .leave-person.排休 { background: #2196F3; }
        .leave-person.喪假 { background: #9c27b0; }
        .leave-person.病假 { background: #f44336; }
        
        .stats {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            text-align: center;
        }
        
        .stats-text {
            color: #666;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .calendar-grid {
                font-size: 11px;
            }
            
            .day {
                min-height: 60px;
                padding: 3px;
            }
            
            .leave-person {
                font-size: 10px;
                padding: 2px 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 CoolPC 請假行事曆</h1>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-color 排休"></div> 排休</div>
            <div class="legend-item"><div class="legend-color 特休"></div> 特休</div>
            <div class="legend-item"><div class="legend-color 喪假"></div> 喪假</div>
            <div class="legend-item"><div class="legend-color 病假"></div> 病假</div>
        </div>
        
        <div class="controls">
            <div class="month-nav">
                <button onclick="changeMonth(-1)">◀ 上個月</button>
                <span id="currentMonth" style="font-size: 1.2em; font-weight: bold; color: #333; min-width: 120px; text-align: center;">2026年3月</span>
                <button onclick="changeMonth(1)">下個月 ▶</button>
            </div>
            
            <select id="deptSelect" onchange="renderCalendar()">
                <option value="">-- 請選擇部門 --</option>
            </select>
            
            <button onclick="renderCalendar()">🔄 更新</button>
        </div>

        <div class="calendar">
            <div class="calendar-grid">
                <div class="day-header">日</div>
                <div class="day-header">一</div>
                <div class="day-header">二</div>
                <div class="day-header">三</div>
                <div class="day-header">四</div>
                <div class="day-header">五</div>
                <div class="day-header">六</div>
            </div>
            
            <div class="calendar-grid" id="calendarBody"></div>
            
            <div class="stats" id="stats">
                <span class="stats-text">請選擇部門</span>
            </div>
        </div>
    </div>

    <script>
        const allLeaveData = {
            "北旗艦": {
                3: ["李世喬(排休)", "陳彥閎(排休)", "黃政學(排休)"],
                7: ["李世喬", "陳彥閎", "黃政學"],
                11: ["李世喬", "陳彥閎"],
                12: ["黃政學"]
            },
            "三創店": { 6: ["董巨揚(排休)", "江玉雯(排休)", "李冠均(排休)"] },
            "新現代1F": { 6: ["王彥淳(排休)", "唐士皓(排休)", "黃柏元(排休)"] },
            "現代店": { 8: ["李炫錚(排休)", "陳冠智(排休)", "黃裕鈞(排休)", "張奕偉(特休)", "劉奕德(特休)"] },
            "光華店": { 6: ["白欣巧(排休)", "王信雄(排休)", "陳浩勻(排休)"] },
            "庫房": { 6: ["李偉玄(排休)", "謝明修(排休)", "翁御玹(排休)"] },
            "工程部": { 12: ["林隆盛(排休)", "梁瑞峰(喪假)", "謝伯承(排休)", "王昱捷(特休)", "陳正展(排休)"] },
            "維修部": { 7: ["林俞安(排休)", "林峙仲(排休)", "戴浩翔(排休)", "薛佳文(排休)"] },
            "電子商務部": { 16: ["吳翰柏(排休)", "汪書鈺(排休)", "林義勝(排休)", "陳怡君(排休)", "黃正賢(排休)", "黃麗梅(排休)"] },
            "五股廠": { 11: ["曾家寶(排休)", "潘俐辰(特休)", "盧世凱(排休)", "李冠臻(排休)"] },
            "採購部": { 11: ["王振泰(排休)", "李振威(排休)", "沈淑娟(排休)", "邱庭方(排休)", "張仁杰(排休)"] },
            "行銷部": { 8: ["林榮邦(排休)", "范揚正(排休)", "賴品成(排休)", "簡志穎(排休)"] },
            "蝦皮電商平台": { 10: ["方鈺傑(排休)", "李志仁(排休)", "林益豪(排休)", "黃政哲(特休)"] },
            "建教生": { 19: ["呂鑫鴻(排休)", "林鼎碩(排休)", "洪鼎軒(排休)", "紀年育(排休)", "陳宥安(排休)"] },
            "桃園店": { 8: ["陳宣佑(排休)", "陳柏安(排休)", "呂紹光(排休)"] },
            "中壢店": { 11: ["陳文浩(排休)", "曾柏維(排休)", "韋星宇(排休)", "連展逸(排休)"] },
            "新竹店": { 11: ["林家宇(排休)", "曹峻豪(喪假)", "黎政賢(排休)", "林俊諺(排休)"] },
            "台中一店": { 6: ["楊士葆(排休)", "鄭翰興(排休)", "蔡宗峻(排休)", "曾偉鈞(排休)"] },
            "台中二店": { 13: ["甘期朧(特休)", "李長益(排休)", "林恩佑(排休)", "梁傑凱(排休)", "郭桓丞(排休)"] },
            "彰化店": { 6: ["陳冠廷(排休)", "周錦男(排休)", "萬宗鑫(排休)"] },
            "嘉義店": { 7: ["鄭凱元(排休)", "鍾禎(排休)", "簡士傑(排休)"] },
            "台南店": { 15: ["何嘉益(排休)", "林柏良(特休)", "陳智成(排休)", "王柳翔(排休)"] },
            "高雄店": { 15: ["吳俊豪(排休)", "林耀信(排休)", "郭宇哲(排休)", "宋品緯(排休)"] },
            "宜蘭店": { 6: ["姜淳文(病假)", "廖偉聖(排休)", "陳琬婷(排休)"] }
        };

        let currentMonth = 2;
        let currentYear = 2026;

        function initDeptSelect() {
            const select = document.getElementById('deptSelect');
            const departments = Object.keys(allLeaveData).sort();
            departments.forEach(dept => {
                const option = document.createElement('option');
                option.value = dept;
                option.textContent = dept;
                select.appendChild(option);
            });
        }

        function renderCalendar() {
            const selectedDept = document.getElementById('deptSelect').value;
            document.getElementById('currentMonth').textContent = `${currentYear}年${currentMonth + 1}月`;
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
            
            const today = new Date();
            const calendarBody = document.getElementById('calendarBody');
            calendarBody.innerHTML = '';
            
            // 上個月
            for (let i = firstDay - 1; i >= 0; i--) {
                calendarBody.innerHTML += `<div class="day other-month"><div class="day-number">${daysInPrevMonth - i}</div></div>`;
            }
            
            // 當月
            for (let day = 1; day <= daysInMonth; day++) {
                let dayClass = 'day';
                const dayOfWeek = new Date(currentYear, currentMonth, day).getDay();
                
                if (today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear) {
                    dayClass += ' today';
                }
                if (dayOfWeek === 0 || dayOfWeek === 6) {
                    dayClass += ' weekend';
                }
                
                let dayContent = `<div class="day-number">${day}</div>`;
                
                // 顯示選中部門的請假人員
                if (selectedDept && allLeaveData[selectedDept] && allLeaveData[selectedDept][day]) {
                    allLeaveData[selectedDept][day].forEach(person => {
                        let leaveType = '排休';
                        if (person.includes('特休')) leaveType = '特休';
                        else if (person.includes('喪假')) leaveType = '喪假';
                        else if (person.includes('病假')) leaveType = '病假';
                        
                        dayContent += `<div class="leave-person ${leaveType}">${person}</div>`;
                    });
                }
                
                calendarBody.innerHTML += `<div class="${dayClass}">${dayContent}</div>`;
            }
            
            // 補齊
            const totalCells = firstDay + daysInMonth;
            const remainingCells = 7 - (totalCells % 7);
            if (remainingCells < 7 && remainingCells > 0) {
                for (let i = 1; i <= remainingCells; i++) {
                    calendarBody.innerHTML += `<div class="day other-month"><div class="day-number">${i}</div></div>`;
                }
            }
            
            // 統計
            const stats = document.getElementById('stats');
            if (selectedDept && allLeaveData[selectedDept]) {
                const deptData = allLeaveData[selectedDept];
                let totalDays = Object.keys(deptData).length;
                let totalPeople = 0;
                Object.values(deptData).forEach(arr => totalPeople += arr.length);
                stats.innerHTML = `<span class="stats-text">🏢 ${selectedDept}：共 ${totalDays} 天有人請假，${totalPeople} 人次</span>`;
            } else {
                stats.innerHTML = `<span class="stats-text">請選擇部門</span>`;
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            else if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        initDeptSelect();
    </script>
</body>
</html>
